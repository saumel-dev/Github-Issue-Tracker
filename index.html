<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- daisy ui & tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <main class="bg-base-200">
        <section class="log-in flex justify-center items-center h-screen">
            <form action="" class="bg-white p-9 md:w-[30%] rounded-md">
                <div class="input-head text-center">
                    <img src="assets/github-logo.png" alt="github-logo" class="mx-auto">
                    <h1 class="text-xl font-semibold mt-6">GitHub Issues Tracker</h1>
                    <p class="text-[#64748B]">Sign in to manage your issues</p>
                </div>
                <div class="input-form flex flex-col mt-4">
                    <form action="" class="">
                        <div class="space-y-1 flex flex-col">
                            <label class="font-medium" for="username">Username</label>
                            <input id="username" type="text" placeholder="Enter Username"
                                class="py-2 px-2 border border-gray-200 rounded-md">
                            <p class="text-purple-500">Default: admin</p>
                        </div>
                        <div class="space-y-1 flex flex-col mt-4">
                            <label class="font-medium" for="password">Password</label>
                            <input id="password" type="password" placeholder="Enter Password"
                                class="py-2 px-2 border border-gray-200 rounded-md">
                            <p class="text-purple-500">Default: admin123</p>
                        </div>
                        <button onclick="login(event)" class="btn btn-primary mt-6">Sign in</button>
                    </form>
                    <div class="divider my-8 font-medium">OR</div>
                    <div class="flex flex-col justify-center items-center">
                        <p class="text-[13px] text-gray-400">Demo Credentials:</p>
                        <div class="flex justify-center items-center flex-col px-30 py-3 mt-3 bg-gray-100 rounded-lg">
                            <p><b>Username:</b> admin</p>
                            <p><b>Password:</b> admin123</p>
                        </div>
                    </div>
                </div>
            </form>
        </section>
    </main>
    <script src="login.js"></script>
</body>

</html>
